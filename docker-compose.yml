# inference-reference-stack — Docker Compose skeleton
#
# All services pull from upstream images; no custom Dockerfiles.
# Configs are mounted in read-only from the repo.
#
# Day 1 scope: services declared. Triton model repository and Grafana
# dashboards arrive in subsequent steps.

services:
  triton:
    # Verify the current tag at https://catalog.ngc.nvidia.com/orgs/nvidia/containers/tritonserver
    # Tag format is YY.MM-vllm-python-py3.
    image: nvcr.io/nvidia/tritonserver:25.01-vllm-python-py3
    container_name: irs-triton
    restart: unless-stopped
    ipc: host
    shm_size: "16gb"
    ports:
      # Bound to localhost only; nginx is the public ingress.
      - "127.0.0.1:8000:8000"   # HTTP (OpenAI-compatible API)
      - "127.0.0.1:8001:8001"   # gRPC
      - "127.0.0.1:8002:8002"   # Prometheus metrics
    volumes:
      - ./triton/model_repository:/models
      - ${HF_CACHE_DIR}:/root/.cache/huggingface
    command:
      - tritonserver
      - --model-repository=/models
      - --log-verbose=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # GPUs 0 and 2 — the NVLink-connected pair on this host.
              device_ids: ["0", "2"]
              capabilities: [gpu]
    networks:
      - irs

  nginx:
    image: nginx:1.27-alpine
    container_name: irs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # enabled when TLS lands
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - triton
    networks:
      - irs

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: irs-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - irs

  grafana:
    image: grafana/grafana:11.3.0
    container_name: irs-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - irs

volumes:
  nginx-logs:
  prometheus-data:
  grafana-data:

networks:
  irs:
    driver: bridge
