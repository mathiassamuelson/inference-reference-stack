# inference-reference-stack — Docker Compose
#
# All services pull from upstream images; no custom Dockerfiles.
# Configs are mounted in read-only from the repo.

services:
  vllm:
    # Pinned by digest to the exact image used in Weeks 8–9 of the training program.
    # Rationale: when vllm-project/vllm#39133 (KV-sizing bug) lands a fix, we want to
    # swap *only* this service, re-run the Week 9 benchmarks, and attribute any change
    # unambiguously to the fix rather than to unrelated vLLM version drift.
    # Tag reference: vllm/vllm-openai:gemma4
    image: vllm/vllm-openai@sha256:0cb12dc964e1dace0a78aecd8905461d851b135db0690726f08550f7c4922834
    container_name: irs-vllm
    restart: unless-stopped
    ipc: host
    shm_size: "16gb"
    ports:
      # Bound to localhost only; nginx is the public ingress.
      - "127.0.0.1:8000:8000"   # HTTP — OpenAI-compatible API and /metrics
    volumes:
      - ${HF_CACHE_DIR}:/root/.cache/huggingface
    command:
      - --model
      - cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
      - --served-model-name
      - gemma-4-26b-awq
      - --tensor-parallel-size
      - "2"
      - --quantization
      - compressed-tensors
      - --gpu-memory-utilization
      - "0.90"
      - --max-model-len
      - "16384"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # GPUs 0 and 2 — the NVLink-connected pair on this host.
              device_ids: ["0", "2"]
              capabilities: [gpu]
    networks:
      - irs

  nginx:
    image: nginx:1.27-alpine
    container_name: irs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # enabled when TLS lands
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - vllm
    networks:
      - irs

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: irs-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - irs

  grafana:
    image: grafana/grafana:11.3.0
    container_name: irs-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - irs

volumes:
  nginx-logs:
  prometheus-data:
  grafana-data:

networks:
  irs:
    driver: bridge
