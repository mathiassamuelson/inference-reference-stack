# Prometheus scrape config for inference-reference-stack.
#
# vLLM's OpenAI-compatible server exposes Prometheus metrics at /metrics on
# the same port as the API (8000), unlike Triton which used a dedicated port.
#
# nginx metrics and exporter-based system metrics (node_exporter,
# nvidia-dcgm-exporter) can be added in later work.

global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets: ['vllm:8000']
