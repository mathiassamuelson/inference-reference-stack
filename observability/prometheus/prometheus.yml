# Prometheus scrape config for inference-reference-stack.
#
# Triton exposes metrics on port 8002 by default. nginx metrics and
# exporter-based system metrics (node_exporter, nvidia-dcgm-exporter) can
# be added in later work.

global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: triton
    metrics_path: /metrics
    static_configs:
      - targets: ['triton:8002']
