# Grafana dashboard provider: loads any JSON dashboards dropped into
# /var/lib/grafana/dashboards (mounted from ./observability/grafana/dashboards).
#
# Dashboards themselves arrive in subsequent work; this provider is a no-op
# until dashboard JSON files are present.

apiVersion: 1

providers:
  - name: default
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
