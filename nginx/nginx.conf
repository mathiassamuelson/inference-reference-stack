# nginx.conf — front door for the multi-tier inference layout.
#
# Repo path: inference-reference-stack/nginx/nginx.conf
# Run:       docker run -d --name nginx-frontdoor --network host \
#              -v "$PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" nginx:stable
#
# Routing contract (the number is an INSTANCE INDEX within a tier; /v1/ is the API
# version namespace, preserved on every proxied route so a future breaking change
# can introduce /v2/ alongside it). Hardware (GPU ids) is deliberately abstracted
# out of the contract — worker->port is an explicit map, not derived from the index:
#
#   /v1/...                 -> least_conn pool over both 12B workers (tier entry, no pinning)
#   /v1/worker/1/...        -> 127.0.0.1:8001   (12B QAT instance 1)
#   /v1/worker/2/...        -> 127.0.0.1:8003   (12B QAT instance 2)
#   /v1/orchestrator/1/...  -> 127.0.0.1:8000   (31B TP=2)
#   /healthz                -> "ok"
#
# Verification instrument: the access log records $upstream_addr per request and
# streams to /dev/stdout, so `docker logs nginx-frontdoor` shows which backend served
# each request — that's how pool distribution and named-route pinning are confirmed.

user  nginx;
worker_processes  auto;
error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # --- logging: surface the chosen upstream per request (the verification instrument) ---
    log_format upstream_aware
        '$remote_addr [$time_local] "$request" '
        'status=$status upstream=$upstream_addr '
        'req_time=$request_time upstream_time=$upstream_response_time';
    access_log  /dev/stdout  upstream_aware;

    # --- 12B worker tier: least_conn pool. Distribution by active-connection count, ---
    # --- which under equal load breaks ties ~round-robin. keepalive reuses upstream  ---
    # --- conns (requires proxy_http_version 1.1 + cleared Connection header below).   ---
    upstream workers {
        # Shared-memory zone: nginx's documented requirement for stateful load balancing.
        # WITHOUT it, each worker process keeps its OWN least_conn active-connection
        # counters, so balancing is per-worker-process rather than global. The zone shares
        # those counts across all worker processes — the correct idiom under
        # `worker_processes auto`. (On this 2-server pool the split measures even with or
        # without the zone; it is kept as defensive correctness for weighted/heterogeneous
        # servers and sustained asymmetric load. See week-14 journal for the load test.)
        zone workers 64k;
        least_conn;
        server 127.0.0.1:8001;   # worker/1
        server 127.0.0.1:8003;   # worker/2
        keepalive 16;
    }

    server {
        listen       8080;
        server_name  _;

        # --- proxy defaults inherited by all locations (LLM-serving tuned) ---
        # buffering OFF so token-streaming SSE (stream=true) flows through immediately;
        # long timeouts because generations can run for minutes.
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;

        # --- liveness ---
        location = /healthz {
            default_type text/plain;
            return 200 "ok\n";
        }

        # --- tier pool: "I don't care which worker." proxy_pass WITHOUT a URI part ---
        # --- preserves the original /v1/... path unchanged to the chosen backend.   ---
        # --- tier pool: "I don't care which worker." Longest-prefix match means the     ---
        # --- named /v1/<tier>/N/ locations below win for their paths; everything else    ---
        # --- under /v1/ (e.g. /v1/chat/completions, /v1/models) pools here. No URI on     ---
        # --- proxy_pass preserves the original /v1/... path unchanged to the backend.     ---
        location /v1/ {
            proxy_pass http://workers;
        }

        # --- named instance routes: "I want THIS instance." The version prefix is now    ---
        # --- part of the LOCATION (/v1/worker/1/), so the trailing-slash strip drops the  ---
        # --- whole /v1/worker/1/ — and the proxy_pass URI re-adds /v1/ for the backend:   ---
        # --- /v1/worker/1/chat/completions -> /v1/chat/completions on 127.0.0.1:8001.     ---
        # --- (Two distinct /v1/ namespaces — front-door API version and vLLM's — which    ---
        # --- coincide today; a future front-door /v2/ could still map to a /v1/ backend.) ---
        location /v1/worker/1/ {
            proxy_pass http://127.0.0.1:8001/v1/;
        }
        location /v1/worker/2/ {
            proxy_pass http://127.0.0.1:8003/v1/;
        }
        location /v1/orchestrator/1/ {
            proxy_pass http://127.0.0.1:8000/v1/;
        }

        # --- anything else is not part of the contract (e.g. an unsupported /v2/...).     ---
        # --- NOTE: an unknown instance like /v1/worker/9/... is NOT caught here — it      ---
        # --- matches /v1/ and falls through to the pool (backend 404), since there's no   ---
        # --- /v1/worker/9/ location. Acceptable for a minimal door; flagged deliberately. ---
        location / {
            default_type application/json;
            return 404 '{"error":"no route; use /v1/, /v1/worker/N/, /v1/orchestrator/N/, or /healthz"}\n';
        }
    }
}