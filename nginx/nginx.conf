# inference-reference-stack — nginx reverse proxy
#
# Minimal HTTP-only config for Day 1. HTTPS termination arrives later in the week.
#
# Critical concern: streaming completions are served as SSE. Default nginx
# proxy buffering holds the entire response before forwarding, which collapses
# token-by-token streaming into a single batched response. Streaming endpoints
# below explicitly disable buffering.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Logs go to a named volume so they survive container restarts and are
    # available for Prometheus log scraping later.
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # Upstream: Triton's OpenAI-compatible HTTP endpoint.
    upstream triton {
        server triton:8000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # LLM responses can be long; generous timeouts.
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 10s;

        # Streaming endpoints: buffering OFF so SSE tokens flush immediately.
        # Matches OpenAI-compatible paths served by Triton's vLLM backend.
        location ~ ^/v1/(chat/completions|completions) {
            proxy_pass http://triton;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering         off;
            proxy_cache             off;
            chunked_transfer_encoding on;
        }

        # Everything else (models list, health checks, etc.) — buffered is fine.
        location / {
            proxy_pass http://triton;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
