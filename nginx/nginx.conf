# nginx.conf — front door for the multi-tier inference layout.
#
# Repo path: inference-reference-stack/nginx/nginx.conf
# Run:       docker run -d --name nginx-frontdoor --network host \
#              -v "$PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" nginx:stable
#
# Routing contract (the number is an INSTANCE INDEX within a tier; /v1/ is the API
# version namespace, preserved on every proxied route so a future breaking change
# can introduce /v2/ alongside it). Hardware (GPU ids) is deliberately abstracted
# out of the contract — worker->port is an explicit map, not derived from the index:
#
#   /v1/...                 -> least_conn pool over both 12B workers (tier entry, no pinning)
#   /worker/1/v1/...        -> 127.0.0.1:8001   (12B QAT instance 1)
#   /worker/2/v1/...        -> 127.0.0.1:8003   (12B QAT instance 2)
#   /orchestrator/1/v1/...  -> 127.0.0.1:8000   (31B TP=2)
#   /healthz                -> "ok"
#
# Verification instrument: the access log records $upstream_addr per request and
# streams to /dev/stdout, so `docker logs nginx-frontdoor` shows which backend served
# each request — that's how pool distribution and named-route pinning are confirmed.

user  nginx;
worker_processes  auto;
error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # --- logging: surface the chosen upstream per request (the verification instrument) ---
    log_format upstream_aware
        '$remote_addr [$time_local] "$request" '
        'status=$status upstream=$upstream_addr '
        'req_time=$request_time upstream_time=$upstream_response_time';
    access_log  /dev/stdout  upstream_aware;

    # --- 12B worker tier: least_conn pool. Distribution by active-connection count, ---
    # --- which under equal load breaks ties ~round-robin. keepalive reuses upstream  ---
    # --- conns (requires proxy_http_version 1.1 + cleared Connection header below).   ---
    upstream workers {
        least_conn;
        server 127.0.0.1:8001;   # worker/1
        server 127.0.0.1:8003;   # worker/2
        keepalive 16;
    }

    server {
        listen       8080;
        server_name  _;

        # --- proxy defaults inherited by all locations (LLM-serving tuned) ---
        # buffering OFF so token-streaming SSE (stream=true) flows through immediately;
        # long timeouts because generations can run for minutes.
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;

        # --- liveness ---
        location = /healthz {
            default_type text/plain;
            return 200 "ok\n";
        }

        # --- tier pool: "I don't care which worker." proxy_pass WITHOUT a URI part ---
        # --- preserves the original /v1/... path unchanged to the chosen backend.   ---
        location /v1/ {
            proxy_pass http://workers;
        }

        # --- named instance routes: "I want THIS instance." Trailing slash on both  ---
        # --- location and proxy_pass strips the /worker/N/ (or /orchestrator/N/)     ---
        # --- prefix, so /worker/1/v1/chat/completions -> /v1/chat/completions.       ---
        location /worker/1/ {
            proxy_pass http://127.0.0.1:8001/;
        }
        location /worker/2/ {
            proxy_pass http://127.0.0.1:8003/;
        }
        location /orchestrator/1/ {
            proxy_pass http://127.0.0.1:8000/;
        }

        # --- anything else is not part of the contract ---
        location / {
            default_type application/json;
            return 404 '{"error":"no route; use /v1/, /worker/N/v1/, /orchestrator/N/v1/, or /healthz"}\n';
        }
    }
}